name: Daily Sync

on:
  schedule:
    - cron: '0 7 * 1-3,11-12 *'  # 09:00 Romania winter (EET, UTC+2)
    - cron: '0 6 * 4-10 *'       # 09:00 Romania summer (EEST, UTC+3)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write Firebase service account
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > firebase-service-account.json
      - name: Run sync script
        env: 
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
        run: python auto_sync_master.py