name: Daily Sync

on:
  schedule:
    # Events-only sync every 6h (ESPN is free)
    - cron: '0 1,13,19 * 1-3,11-12 *'   # Winter events-only: 03:00, 15:00, 21:00 Romania
    - cron: '0 0,12,18 * 4-10 *'         # Summer events-only: 03:00, 15:00, 21:00 Romania
    # FULL sync (events+odds) at 09:00 Romania, before ticket generation at 10:00
    - cron: '0 7 * 1-3,11-12 *'          # Winter FULL sync: 09:00 Romania (EET, UTC+2)
    - cron: '0 6 * 4-10 *'               # Summer FULL sync: 09:00 Romania (EEST, UTC+3)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write Firebase service account
        run: |
          if [ -z "$FIREBASE_SA" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is empty or not set"
            exit 1
          fi
          echo "$FIREBASE_SA" | base64 -d > firebase-service-account.json
          python -c "import json; json.load(open('firebase-service-account.json')); print('Firebase SA JSON is valid')" || {
            echo "::error::firebase-service-account.json is not valid JSON after base64 decode"
            exit 1
          }
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Determine sync mode
        id: sync_mode
        run: |
          # Manual triggers (workflow_dispatch) always do a full sync
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip_odds=false" >> $GITHUB_OUTPUT
            echo "Running FULL sync (manual trigger)"
          else
            HOUR=$(date -u +%H)
            # Full sync (with odds) at 06:00 or 07:00 UTC (09:00 Romania winter/summer)
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "07" ]; then
              echo "skip_odds=false" >> $GITHUB_OUTPUT
              echo "Running FULL sync (events + odds)"
            else
              echo "skip_odds=true" >> $GITHUB_OUTPUT
              echo "Running events-only sync (preserving API keys)"
            fi
          fi
      - name: Run sync script
        env: 
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
        run: |
          if [ "${{ steps.sync_mode.outputs.skip_odds }}" = "true" ]; then
            python auto_sync_master.py --skip-odds
          else
            python auto_sync_master.py
          fi