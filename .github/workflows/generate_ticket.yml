name: Daily Ticket Generator

on:
  workflow_dispatch:
  # Auto-trigger after Daily Sync finishes (even if delayed by GitHub Actions)
  workflow_run:
    workflows: ["Daily Sync"]
    types: [completed]
  schedule:
    # Safety-net cron in case sync workflow is skipped/failed
    - cron: '0 8 * 1-3,11-12 *'  # 10:00 Romania winter (EET, UTC+2)
    - cron: '0 7 * 4-10 *'       # 10:00 Romania summer (EEST, UTC+3)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    # Skip if triggered by a failed sync run
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment variables from secrets
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "APP_API_KEY=${{ secrets.APP_API_KEY }}" >> $GITHUB_ENV

      - name: Write Firebase service account
        run: |
          if [ -z "$FIREBASE_SA" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is empty or not set"
            exit 1
          fi
          echo "$FIREBASE_SA" | base64 -d > firebase-service-account.json
          python -c "import json; json.load(open('firebase-service-account.json')); print('Firebase SA JSON is valid')" || {
            echo "::error::firebase-service-account.json is not valid JSON after base64 decode"
            exit 1
          }
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Populate sports.db (events from ESPN + odds from Firestore — 0 API credits)
        run: python auto_sync_master.py --skip-odds

      - name: Verify sports.db has data
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('sports.db')
          count = conn.execute('SELECT COUNT(*) FROM events').fetchone()[0]
          print(f'Events in DB: {count}')
          if count == 0:
              print('::warning::No events in sports.db - tickets will be empty')
          conn.close()
          "

      - name: Run generate_ticket.py
        run: python generate_ticket.py

      - name: Verify tickets in Firestore
        run: |
          python <<'PY'
          import firebase_admin
          from firebase_admin import credentials, firestore
          cred = credentials.Certificate('firebase-service-account.json')
          if not firebase_admin._apps:
              firebase_admin.initialize_app(cred)
          db = firestore.client()
          for cat in ['mixed', 'football', 'basketball', 'hockey']:
              doc = db.collection('daily_tickets').document(cat).get()
              if doc.exists:
                  d = doc.to_dict()
                  n = len(d.get('ticket', []))
                  print(f'  {cat}: {n} picks, date={d.get("date", "?")}')
              else:
                  print(f'  {cat}: NOT FOUND in Firestore!')
          print('Done.')
          PY

      - name: Commit updated ticket JSONs to repo
        run: |
          # Copy generated tickets to data/ folder
          mkdir -p data
          cp daily_ticket_*.json data/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_ticket_*.json data/daily_ticket_*.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "🎫 Update daily tickets $(date -u +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push