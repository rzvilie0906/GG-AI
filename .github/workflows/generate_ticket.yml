name: Daily Ticket Generator

on:
  schedule:
    # Runs every day at 08:00 UTC (10:00 Romanian time, which is UTC+2)
    - cron: '0 8 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # or your required version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generate_ticket.py
        run: python generate_ticket.py