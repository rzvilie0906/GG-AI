name: Daily Ticket Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * 1-3,11-12 *'  # 10:00 Romania winter (EET, UTC+2)
    - cron: '0 7 * 4-10 *'       # 10:00 Romania summer (EEST, UTC+3)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment variables from secrets
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "APP_API_KEY=${{ secrets.APP_API_KEY }}" >> $GITHUB_ENV

      - name: Write Firebase service account
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 -d > firebase-service-account.json

      - name: Debug Firebase service account file
        run: |
          head -c 100 firebase-service-account.json
          echo "..."
          tail -c 100 firebase-service-account.json

      - name: Validate JSON
        run: |
          python -c "import json; json.load(open('firebase-service-account.json'))"

      - name: Run generate_ticket.py
        run: python generate_ticket.py